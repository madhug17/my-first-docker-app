<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="glass-card">
        <h1>Student Success AI 🎓</h1>
        <p class="subtitle">Enter student data to predict performance</p>

        <div class="form-grid">
            <div class="input-group">
                <label>G1 Grade (0-20)</label>
                <input type="number" id="g1" value="15" min="0" max="20">
            </div>
            <div class="input-group">
                <label>G2 Grade (0-20)</label>
                <input type="number" id="g2" value="14" min="0" max="20">
            </div>
            <div class="input-group">
                <label>Absences</label>
                <input type="number" id="absences" value="2">
            </div>
            <div class="input-group">
                <label>Higher Ed?</label>
                <select id="higher">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
        </div>

        <button id="predict-btn" onclick="makePrediction()">Analyze Performance</button>

        <div id="loader" class="hidden">Scanning data... 🔍</div>

        <div id="result-container" class="hidden">
            <h2 id="prediction-text"></h2>
            <div class="confidence-box">
                <span>AI Confidence: <span id="confidence-pct">0</span>%</span>
                <div class="progress-bg">
                    <div id="progress-bar"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
